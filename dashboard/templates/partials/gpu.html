<div class="border-3 border-black bg-butter-light p-4" style="border-width: 3px;">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-extrabold uppercase tracking-widest">GPU</h2>
        <span class="htmx-indicator text-xs font-bold">UPDATING...</span>
    </div>
    {% if gpu %}
    <div class="space-y-4">
        <div class="text-sm font-bold border-2 border-black bg-white px-3 py-2">{{ gpu.name }}</div>

        <!-- VRAM -->
        <div>
            <div class="flex justify-between text-sm font-bold mb-1">
                <span>VRAM</span>
                <span>{{ gpu.mem_used }} / {{ gpu.mem_total }} MB</span>
            </div>
            <div class="h-4 bg-white border-2 border-black overflow-hidden">
                <div class="h-full transition-all duration-500
                    {% if gpu.mem_pct > 90 %}bg-red-400{% elif gpu.mem_pct > 70 %}bg-amber-300{% else %}bg-green-400{% endif %}"
                    style="width: {{ gpu.mem_pct }}%">
                </div>
            </div>
            <div class="text-xs font-bold mt-1">{{ gpu.mem_pct }}%</div>
        </div>

        <!-- Utilization -->
        <div>
            <div class="flex justify-between text-sm font-bold mb-1">
                <span>UTILIZATION</span>
                <span>{{ gpu.util }}%</span>
            </div>
            <div class="h-4 bg-white border-2 border-black overflow-hidden">
                <div class="h-full transition-all duration-500
                    {% if gpu.util > 90 %}bg-red-400{% elif gpu.util > 70 %}bg-amber-300{% else %}bg-blue-400{% endif %}"
                    style="width: {{ gpu.util }}%">
                </div>
            </div>
        </div>

        <!-- Temperature -->
        <div class="flex items-center justify-between p-3 border-2 border-black bg-white">
            <span class="text-sm font-bold uppercase">Temperature</span>
            <span class="text-xl font-extrabold
                {% if gpu.temp > 85 %}text-red-600{% elif gpu.temp > 70 %}text-amber-600{% else %}text-green-600{% endif %}">
                {{ gpu.temp }}&deg;C
            </span>
        </div>
    </div>
    {% else %}
    <div class="text-sm font-bold text-center py-4 border-2 border-black bg-white">
        GPU NOT AVAILABLE
    </div>
    {% endif %}
</div>
