{% if agent_running %}
<button hx-post="/api/agent_toggle" hx-target="#agent-btn" hx-swap="innerHTML"
        class="px-2 py-1 text-xs font-bold uppercase tracking-wide"
        style="border: 3px solid #000; background: #22c55e; color: #fff;"
        title="Agent RUNNING — click to sleep">AGENT</button>
{% else %}
<button hx-post="/api/agent_toggle" hx-target="#agent-btn" hx-swap="innerHTML"
        class="px-2 py-1 text-xs font-bold uppercase tracking-wide"
        style="border: 3px solid #000; background: #ef4444; color: #fff;"
        title="Agent STOPPED — click to wake">AGENT</button>
{% endif %}
