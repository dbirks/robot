{% if mic_muted %}
<button hx-post="/api/mic_toggle" hx-target="#mic-btn" hx-swap="innerHTML"
        class="px-2 py-1 text-xs font-bold uppercase tracking-wide"
        style="border: 3px solid #000; background: #ef4444; color: #fff;"
        title="Mic MUTED — click to unmute">MIC</button>
{% else %}
<button hx-post="/api/mic_toggle" hx-target="#mic-btn" hx-swap="innerHTML"
        class="px-2 py-1 text-xs font-bold uppercase tracking-wide"
        style="border: 3px solid #000; background: #22c55e; color: #fff;"
        title="Mic LIVE — click to mute">MIC</button>
{% endif %}
