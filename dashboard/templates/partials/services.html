<div class="border-3 border-black bg-mint-light p-4" style="border-width: 3px;">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-extrabold uppercase tracking-widest">Services</h2>
        <span class="htmx-indicator text-xs font-bold">UPDATING...</span>
    </div>
    <div class="space-y-2">
        {% for svc in services %}
        <div class="flex items-center justify-between p-3 border-2 border-black bg-white">
            <div class="flex items-center gap-3">
                <!-- Status square -->
                {% if svc.running %}
                <div class="w-4 h-4 bg-green-500 border-2 border-black"></div>
                {% else %}
                <div class="w-4 h-4 bg-red-400 border-2 border-black"></div>
                {% endif %}
                <div>
                    <div class="text-sm font-bold">{{ svc.name }}</div>
                    <div class="text-xs">{{ svc.active }} ({{ svc.sub }})</div>
                </div>
            </div>
            <div class="flex gap-1">
                <button
                    hx-post="/services/{{ svc.name }}/restart"
                    hx-target="#services-panel"
                    hx-swap="innerHTML"
                    class="px-3 py-1 text-xs font-bold uppercase border-2 border-black bg-mint hover:bg-green-300">
                    Restart
                </button>
                <button
                    hx-post="/services/{{ svc.name }}/stop"
                    hx-target="#services-panel"
                    hx-swap="innerHTML"
                    class="px-3 py-1 text-xs font-bold uppercase border-2 border-black bg-blush hover:bg-red-300">
                    Stop
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
