<div class="card">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-white">Services</h2>
        <span class="htmx-indicator text-xs text-slate-400">updating...</span>
    </div>
    <div class="space-y-3">
        {% for svc in services %}
        <div class="flex items-center justify-between p-3 rounded-lg bg-slate-800/50">
            <div class="flex items-center gap-3">
                <!-- Status dot -->
                {% if svc.running %}
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-sm shadow-emerald-400/50"></div>
                {% else %}
                <div class="w-2.5 h-2.5 rounded-full bg-red-400 shadow-sm shadow-red-400/50"></div>
                {% endif %}
                <div>
                    <div class="text-sm font-medium text-slate-200">{{ svc.name }}</div>
                    <div class="text-xs text-slate-500">{{ svc.active }} ({{ svc.sub }})</div>
                </div>
            </div>
            <div class="flex gap-1.5">
                <button
                    hx-post="/services/{{ svc.name }}/restart"
                    hx-target="#services-panel"
                    hx-swap="innerHTML"
                    class="px-2.5 py-1 text-xs font-medium rounded-md bg-slate-700 text-slate-300 hover:bg-slate-600 hover:text-white transition-colors"
                    title="Restart {{ svc.name }}">
                    Restart
                </button>
                <button
                    hx-post="/services/{{ svc.name }}/stop"
                    hx-target="#services-panel"
                    hx-swap="innerHTML"
                    class="px-2.5 py-1 text-xs font-medium rounded-md bg-slate-700 text-red-400 hover:bg-red-900/50 hover:text-red-300 transition-colors"
                    title="Stop {{ svc.name }}">
                    Stop
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
