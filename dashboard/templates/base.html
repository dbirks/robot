<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reachy Mini — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#f5f0eb',
                        mint: '#d5e8d4',
                        'mint-light': '#e8f5e6',
                        blush: '#f4d4d4',
                        'blush-light': '#fce8e8',
                        lavender: '#d4d4f4',
                        'lavender-light': '#e8e8fc',
                        butter: '#f4f0d4',
                        'butter-light': '#faf8e8',
                    },
                    fontFamily: {
                        mono: ['"Maple Mono"', '"IBM Plex Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
                    },
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f5f0eb; font-family: 'Maple Mono', 'IBM Plex Mono', monospace; }

        /* Scrollbar */
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-track { background: #f5f0eb; border-left: 2px solid #000; }
        .scroll-area::-webkit-scrollbar-thumb { background: #000; }

        /* HTMX loading indicator */
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-indicator { display: none; }

        /* Range slider brutalist style */
        input[type="range"] { -webkit-appearance: none; appearance: none; height: 8px; background: #000; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 20px; height: 20px; background: #d4d4f4; border: 3px solid #000; cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px; height: 20px; background: #d4d4f4; border: 3px solid #000; cursor: pointer;
        }

        /* Select brutalist style */
        select { -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="min-h-screen font-mono text-black">

    <!-- NAV BAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-butter border-b-3 border-black"
         style="border-bottom: 3px solid #000;">
        <div class="max-w-6xl mx-auto flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-4">
                <span class="text-lg font-extrabold tracking-widest uppercase">REACHY MINI</span>
            </div>
            <!-- Hamburger button (mobile) -->
            <button onclick="document.getElementById('nav-links').classList.toggle('hidden')"
                    class="md:hidden border-2 border-black bg-cream px-2 py-1 text-lg font-bold">☰</button>
            <!-- Nav links -->
            <div id="nav-links" class="hidden md:flex items-center gap-0 absolute md:relative top-full left-0 right-0 md:top-auto bg-butter md:bg-transparent border-b-3 md:border-0 border-black"
                 style="border-bottom: 3px solid #000;">
                <a href="/conversation"
                   class="block md:inline px-4 py-2 text-sm font-bold uppercase tracking-wide border-2 border-black md:border-2
                          {% if active_page == 'conversation' %}bg-black text-cream{% else %}bg-cream text-black hover:bg-blush{% endif %}">
                    Conversation
                </a>
                <a href="/services"
                   class="block md:inline px-4 py-2 text-sm font-bold uppercase tracking-wide border-2 border-black border-t-0 md:border-t-2 md:border-l-0
                          {% if active_page == 'services' %}bg-black text-cream{% else %}bg-cream text-black hover:bg-mint{% endif %}">
                    Services
                </a>
                <a href="/settings"
                   class="block md:inline px-4 py-2 text-sm font-bold uppercase tracking-wide border-2 border-black border-t-0 md:border-t-2 md:border-l-0
                          {% if active_page == 'settings' %}bg-black text-cream{% else %}bg-cream text-black hover:bg-lavender{% endif %}">
                    Settings
                </a>
                <a href="/faces"
                   class="block md:inline px-4 py-2 text-sm font-bold uppercase tracking-wide border-2 border-black border-t-0 md:border-t-2 md:border-l-0
                          {% if active_page == 'faces' %}bg-black text-cream{% else %}bg-cream text-black hover:bg-butter{% endif %}">
                    Faces
                </a>
            </div>
            <div class="text-xs font-bold hidden md:block" id="clock"></div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="max-w-6xl mx-auto px-4 pt-20 pb-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Live clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
